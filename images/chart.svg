<svg viewBox="0 0 260 170" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Background -->
  <rect width="260" height="160" fill="white" rx="10" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Y axis labels -->
  <text x="10" y="30" font-size="9" fill="#aaa" style="fill:rgb(170, 170, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">60</text>
  <text x="10" y="70" font-size="9" fill="#aaa" style="fill:rgb(170, 170, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">40</text>
  <text x="10" y="110" font-size="9" fill="#aaa" style="fill:rgb(170, 170, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">20</text>

  <!-- Grid lines -->
  <line x1="30" y1="25" x2="250" y2="25" stroke="#f0f0f0" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(240, 240, 240);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="30" y1="65" x2="250" y2="65" stroke="#f0f0f0" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(240, 240, 240);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="30" y1="105" x2="250" y2="105" stroke="#f0f0f0" stroke-width="1" style="fill:rgb(0, 0, 0);stroke:rgb(240, 240, 240);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Group 1: 1-10 Aug -->
  <rect x="40" y="65" width="18" height="55" rx="5" fill="#c4bfff" style="fill:rgb(196, 191, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="62" y="45" width="18" height="75" rx="5" fill="#6c63ff" style="fill:rgb(108, 99, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Group 2: 11-20 Aug -->
  <rect x="105" y="75" width="18" height="45" rx="5" fill="#c4bfff" style="fill:rgb(196, 191, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="127" y="55" width="18" height="65" rx="5" fill="#6c63ff" style="fill:rgb(108, 99, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Group 3: 21-30 Aug -->
  <rect x="170" y="35" width="18" height="85" rx="5" fill="#6c63ff" style="fill:rgb(108, 99, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <rect x="192" y="80" width="18" height="40" rx="5" fill="#c4bfff" style="fill:rgb(196, 191, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- X axis labels -->
  <text x="42" y="135" font-size="8" fill="#aaa" style="fill:rgb(170, 170, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:8px;font-weight:400;text-anchor:start;dominant-baseline:auto">1-10 Aug</text>
  <text x="105" y="135" font-size="8" fill="#aaa" style="fill:rgb(170, 170, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:8px;font-weight:400;text-anchor:start;dominant-baseline:auto">11-20 Aug</text>
  <text x="168" y="135" font-size="8" fill="#aaa" style="fill:rgb(170, 170, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:sans-serif;font-size:8px;font-weight:400;text-anchor:start;dominant-baseline:auto">21-30 Aug</text>
</svg>